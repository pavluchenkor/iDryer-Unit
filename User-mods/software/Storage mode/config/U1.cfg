[heater_generic iDryer_U1_Heater]
heater_pin: iDryer:H_U1
max_power: 1
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: iDryer:T_U1
control: pid
pwm_cycle_time: 0.3
min_temp: 0
max_temp: 125
pid_Kp=48.732
pid_Ki=3.734
pid_Kd=158.990

[verify_heater iDryer_U1_Heater]
max_error: 240
check_gain_time: 120
heating_gain: 1

[heater_fan Fan_U1]
fan_speed: 1
pin: iDryer:FAN_U1
heater: iDryer_U1_Heater
heater_temp: 55

[temperature_sensor iDryer_U1_Air]
sensor_type: SHT3X
i2c_mcu: iDryer
i2c_bus: i2c0f
i2c_address: 68

[servo srv_U1]
pin: iDryer:SRV_U1
maximum_servo_angle: 180
minimum_pulse_width: 0.00054
maximum_pulse_width: 0.00245

[neopixel sprd]
pin: iDryer:NEOPIXEL0
chain_count: 4
color_order: GRB
initial_RED: 0
initial_GREEN: 0
initial_BLUE: 0.01

[gcode_macro PLA_U1]
variable_unit_temp: 55
variable_unit_duration: 180
variable_unit_humidity: 10
gcode:
    DRY_U1 UNIT_TEMPERATURE={unit_temp} HUMIDITY={unit_humidity} TIME={unit_duration}

[gcode_macro TPU_U1]
variable_unit_temp: 60
variable_unit_duration: 300
variable_unit_humidity: 10
gcode:
    DRY_U1 UNIT_TEMPERATURE={unit_temp} HUMIDITY={unit_humidity} TIME={unit_duration}

[gcode_macro PETG_U1]
variable_unit_temp: 65
variable_unit_duration: 240
variable_unit_humidity: 10
gcode:
    DRY_U1 UNIT_TEMPERATURE={unit_temp} HUMIDITY={unit_humidity} TIME={unit_duration}

[gcode_macro ABS_U1]
variable_unit_temp: 80
variable_unit_duration: 240
variable_unit_humidity: 10
gcode:
    DRY_U1 UNIT_TEMPERATURE={unit_temp} HUMIDITY={unit_humidity} TIME={unit_duration}

[gcode_macro PA_U1]
variable_unit_temp: 90
variable_unit_duration: 240
variable_unit_humidity: 10
gcode:
    DRY_U1 UNIT_TEMPERATURE={unit_temp} HUMIDITY={unit_humidity} TIME={unit_duration}

[gcode_macro DRY_U1]
variable_temp: 5
variable_humidity: 5
variable_duration: 5
variable_off_timer_set: 0 
variable_delta_high: 15
variable_servo_angle: 0 #degrees
variable_servo_open_angle: 30 #degrees
variable_servo_closed_angle: 85 #degrees
variable_servo_open_time: 10 #second
variable_servo_closed_time: 600 #second
variable_delta_humidity: 5 #persent humidity
variable_data: {}
gcode:
    {% set set_unit_temp = params.UNIT_TEMPERATURE|default(55)|int%} 
    {% set set_unit_humidity = params.HUMIDITY|default(10)|int%} 
    {% set set_unit_duration = params.TIME|default(240)|int%}
      
    SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=servo_angle VALUE={servo_closed_angle}
    SET_SERVO SERVO=srv_U1 ANGLE={servo_closed_angle}
    G4 P300
    SET_SERVO SERVO=srv_U1 WIDTH=0

    {action_respond_info("DRY_U1 ----- [ temp  %s | humidity  %s | duration  %s ] -----" %(set_unit_temp, set_unit_humidity, set_unit_duration))}
    {action_respond_info("Humidity: %.2f%%" %(printer["sht3x iDryer_U1_Air"].humidity))}
    
    SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=temp VALUE={set_unit_temp}
    SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=humidity VALUE={set_unit_humidity}
    SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=duration VALUE={set_unit_duration}
    
    UPDATE_DELAYED_GCODE ID=_UPDATE_U1 DURATION=1
    UPDATE_DELAYED_GCODE ID=_LED_SERVICE DURATION=1
    UPDATE_DELAYED_GCODE ID=_TOGGLE_SERVO_U1 DURATION={servo_closed_time}
    
    RESPOND PREFIX=tgnotify MSG=Drying!

[delayed_gcode _UPDATE_U1]
gcode:
    {% set unit_data = printer['gcode_macro DRY_U1'] %}
    {% set temperature = unit_data.temp %}
    {% set delta_high =  unit_data.delta_high %}
    {% set dry_duration =  unit_data.duration %}
    {% set off_timer_set = unit_data.off_timer_set %} 

    UPDATE_DELAYED_GCODE ID=_STORAGE_U1 DURATION=0
    
    {% if printer['temperature_sensor iDryer_U1_Air'].temperature|int > temperature|int %}
        {% set target_temp = 0|int %}
        
    {% elif printer['temperature_sensor iDryer_U1_Air'].temperature|int == temperature|int %}
        {% if off_timer_set == 0 %}
            UPDATE_DELAYED_GCODE ID=_OFF_U1 DURATION={dry_duration * 60}
            SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=off_timer_set VALUE=1
        {% endif %}
        {% set target_temp = printer['temperature_sensor iDryer_U1_Air'].temperature|int %}
        
    {% elif printer['temperature_sensor iDryer_U1_Air'].temperature|int < temperature|int %}
        {% set target_temp = temperature|int + delta_high|int %}
        
    {% endif %}
    
    SET_HEATER_TEMPERATURE HEATER=iDryer_U1_Heater TARGET={target_temp|int}
    UPDATE_DELAYED_GCODE ID=_UPDATE_U1 DURATION=1

[delayed_gcode _LED_SERVICE]
gcode:
    {% set cur_heater_state =   printer['heater_generic iDryer_U1_Heater'].power|float%} 
    {% set cur_fan_state =      printer['heater_fan Fan_U1'].speed|float%} 
    {% set cur_unit_humidity =  printer["sht3x iDryer_U1_Air"].humidity|float%}
    {% set cur_unit_temp =      printer['temperature_sensor iDryer_U1_Air'].temperature|float%}

    {% if cur_fan_state != 0 %}
        SET_LED LED=sprd RED={0} GREEN={0.5} BLUE={0} INDEX={2}
    {% else %}
        SET_LED LED=sprd RED={0.01} GREEN={0.01} BLUE={0.01} INDEX={2}
    {% endif %}
        
    {% if cur_unit_humidity < 10 %}
        SET_LED LED=sprd RED={0.01} GREEN={0.5} BLUE={0.01} INDEX={3}
    {% elif cur_unit_humidity >= 10 and cur_unit_humidity < 20 %}
        SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.1} INDEX={3}
    {% elif cur_unit_humidity >= 20 and cur_unit_humidity < 30 %}
        SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.2} INDEX={3}
    {% elif cur_unit_humidity >= 30 and cur_unit_humidity < 40 %}
        SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.3} INDEX={3}
    {% elif cur_unit_humidity >= 40 and cur_unit_humidity < 50 %}
        SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.4} INDEX={3}
    {% elif cur_unit_humidity >= 50 and cur_unit_humidity < 60 %}
        SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.5} INDEX={3}
    {% elif cur_unit_humidity >= 60 and cur_unit_humidity < 70 %}
        SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.6} INDEX={3}
    {% else %}
        SET_LED LED=sprd RED={0.7} GREEN={0} BLUE={0.07} INDEX={3}
    {% endif %}
    
    {% if cur_unit_temp < 30 %}
        SET_LED LED=sprd RED={0.01} GREEN={0.01} BLUE={0.01} INDEX={4}
    {% elif cur_unit_temp >= 30 and cur_unit_temp < 40 %}
        SET_LED LED=sprd RED={0.1} GREEN={0} BLUE={0} INDEX={4}
    {% elif cur_unit_temp >= 40 and cur_unit_temp < 50 %}
        SET_LED LED=sprd RED={0.2} GREEN={0} BLUE={0} INDEX={4}
    {% elif cur_unit_temp >= 50 and cur_unit_temp < 60 %}
        SET_LED LED=sprd RED={0.3} GREEN={0} BLUE={0} INDEX={4}
    {% elif cur_unit_temp >= 60 and cur_unit_temp < 70 %}
        SET_LED LED=sprd RED={0.4} GREEN={0} BLUE={0} INDEX={4}
    {% elif cur_unit_temp >= 70 and cur_unit_temp < 80 %}
        SET_LED LED=sprd RED={0.5} GREEN={0} BLUE={0} INDEX={4}
    {% elif cur_unit_temp >= 80 and cur_unit_temp < 90 %}
        SET_LED LED=sprd RED={0.6} GREEN={0} BLUE={0} INDEX={4}
    {% else %}
        SET_LED LED=sprd RED={0.7} GREEN={0} BLUE={0} INDEX={4}
    {% endif %}

    {% if cur_heater_state != 0 %}
        SET_LED LED=sprd RED={0.5} GREEN={0} BLUE={0} INDEX={1} TRANSMIT=1 SYNC=0
    {% else %}
        SET_LED LED=sprd RED={0.01} GREEN={0.01} BLUE={0.01} INDEX={1} TRANSMIT=1 SYNC=0
    {% endif %}
   
    UPDATE_DELAYED_GCODE ID=_LED_SERVICE DURATION=1

[delayed_gcode _TOGGLE_SERVO_U1]
gcode:
    {% set unit_data = printer['gcode_macro DRY_U1'] %}
    {% set servo_angle = unit_data.servo_angle %}
    
    {% if servo_angle == printer['gcode_macro DRY_U1'].servo_open_angle %}
        SET_SERVO SERVO=srv_U1 ANGLE={printer['gcode_macro DRY_U1'].servo_closed_angle}
        G4 P300
        SET_SERVO SERVO=srv_U1 WIDTH=0
        SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=servo_angle VALUE={printer['gcode_macro DRY_U1'].servo_closed_angle}
        UPDATE_DELAYED_GCODE ID=_TOGGLE_SERVO_U1 DURATION={printer['gcode_macro DRY_U1'].servo_closed_time}
        
    {% elif servo_angle == printer['gcode_macro DRY_U1'].servo_closed_angle %}
        SET_SERVO SERVO=srv_U1 ANGLE={printer['gcode_macro DRY_U1'].servo_open_angle}
        G4 P300
        SET_SERVO SERVO=srv_U1 WIDTH=0
        SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=servo_angle VALUE={printer['gcode_macro DRY_U1'].servo_open_angle}
        UPDATE_DELAYED_GCODE ID=_TOGGLE_SERVO_U1 DURATION={printer['gcode_macro DRY_U1'].servo_open_time}
        
    {% endif %}

[delayed_gcode _OFF_U1]
gcode:
    {% set unit_data = printer['gcode_macro DRY_U1'] %}
    {% set servo_closed_angle = unit_data.servo_closed_angle %}

    RESPOND PREFIX=tgnotify MSG="Storage mode activated!"
    {action_respond_info("Humidity: %.2f%%" %(printer["sht3x iDryer_U1_Air"].humidity))}
    
    UPDATE_DELAYED_GCODE ID=_UPDATE_U1 DURATION=0
    SET_HEATER_TEMPERATURE HEATER=iDryer_U1_Heater TARGET=0

    UPDATE_DELAYED_GCODE ID=_LED_SERVICE DURATION=0
    SET_LED LED=sprd RED={0} GREEN={0.01} BLUE={0} TRANSMIT=1 SYNC=0
    
    UPDATE_DELAYED_GCODE ID=_TOGGLE_SERVO_U1 DURATION=0
    SET_SERVO SERVO=srv_U1 ANGLE={servo_closed_angle}
    G4 P300
    SET_SERVO SERVO=srv_U1 WIDTH=0
    
    UPDATE_DELAYED_GCODE ID=_STORAGE_U1 DURATION=1

[delayed_gcode _STORAGE_U1]
gcode:
    {% set unit_data = printer['gcode_macro DRY_U1'] %}
    {% set temperature = unit_data.temp %}
    {% set delta_high =  unit_data.delta_high %}
    {% set humidity =  unit_data.humidity %}
    {% set delta_humidity =  unit_data.delta_humidity %}
    
	{% if printer["sht3x iDryer_U1_Air"].humidity|int < humidity|int %}
        SET_HEATER_TEMPERATURE HEATER=iDryer_U1_Heater TARGET=0

    {% elif printer["sht3x iDryer_U1_Air"].humidity|int >= humidity|int + delta_humidity %}
		{% if printer['temperature_sensor iDryer_U1_Air'].temperature|int > temperature|int %}
			{% set target_temp = 0|int %}
		{% elif printer['temperature_sensor iDryer_U1_Air'].temperature|int == temperature|int %}
			{% set target_temp = printer['temperature_sensor iDryer_U1_Air'].temperature|int %}
		{% elif printer['temperature_sensor iDryer_U1_Air'].temperature|int < temperature|int %}
			{% set target_temp = temperature|int + delta_high|int %}
		{% endif %}
		SET_HEATER_TEMPERATURE HEATER=iDryer_U1_Heater TARGET={target_temp|int}
        
	{% endif %}
    
    UPDATE_DELAYED_GCODE ID=_STORAGE_U1 DURATION=1

[gcode_macro OFF_U1]
gcode:
    {% set unit_data = printer['gcode_macro DRY_U1'] %}
    {% set servo_closed_angle = unit_data.servo_closed_angle %}
    
    UPDATE_DELAYED_GCODE ID=_OFF_U1 DURATION=0
    
    UPDATE_DELAYED_GCODE ID=_UPDATE_U1 DURATION=0
    SET_HEATER_TEMPERATURE HEATER=iDryer_U1_Heater TARGET=0
        
    UPDATE_DELAYED_GCODE ID=_LED_SERVICE DURATION=0
    SET_LED LED=sprd RED={0} GREEN={0} BLUE={0.01} TRANSMIT=1 SYNC=0

    UPDATE_DELAYED_GCODE ID=_TOGGLE_SERVO_U1 DURATION=0
    SET_SERVO SERVO=srv_U1 ANGLE={servo_closed_angle}
    G4 P300
    SET_SERVO SERVO=srv_U1 WIDTH=0

    UPDATE_DELAYED_GCODE ID=_STORAGE_U1 DURATION=0
        
    RESPOND PREFIX=tgnotify MSG="iDryer is off"
    {action_respond_info("Humidity: %.2f%%" %(printer["sht3x iDryer_U1_Air"].humidity))}

[gcode_macro STORAGE_U1]
gcode:
    {% set storage_temperature = params.TEMPERATURE|default(55)|int%} 
    {% set storage_humidity = params.HUMIDITY|default(10)|int%}

    SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=temp VALUE={storage_temperature}
    SET_GCODE_VARIABLE MACRO=DRY_U1 VARIABLE=humidity VALUE={storage_humidity}

    UPDATE_DELAYED_GCODE ID=_OFF_U1 DURATION=1